version: '3.8'

services:
  # The Ollama service (The brain)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama

  # Your Predictive Maintenance App (The interface)
  ai-diagnostic-app:
    build: .
    container_name: diagnostic_agent
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - .:/app